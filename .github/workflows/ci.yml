name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  backend:
    name: Backend Check (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: LinqoraHost
    steps:
      - uses: actions/checkout@v4

      - name: Install Fyne system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc libgl1-mesa-dev libx11-dev \
            libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxext-dev

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'LinqoraHost/go.mod'
          cache-dependency-path: LinqoraHost/go.sum

      - name: Download Modules
        run: go mod download

      - name: Check Formatting
        run: |
          if [ "$(gofmt -l . | wc -l)" -gt 0 ]; then
            echo "The following files are not formatted:"
            gofmt -l .
            exit 1
          fi

      - name: Golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: LinqoraHost

      - name: Run Tests
        run: go test -v ./...

  gui-build:
    name: GUI Build (Windows)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: LinqoraHost
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'LinqoraHost/go.mod'
          cache-dependency-path: LinqoraHost/go.sum

      - name: Download Modules
        run: go mod download

      - name: Build Windows GUI binary
        run: go build -v ./cmd/...
