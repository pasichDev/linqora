name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  backend:
    name: Backend Check (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: LinqoraHost
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: LinqoraHost/go.sum

      - name: Download Modules
        run: go mod download

      - name: Check Formatting
        run: |
          if [ "$(gofmt -l . | wc -l)" -gt 0 ]; then
            echo "The following files are not formatted:"
            gofmt -l .
            exit 1
          fi

      - name: Golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: LinqoraHost

      - name: Run Tests
        run: go test -v ./...
